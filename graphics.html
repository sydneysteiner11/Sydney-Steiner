<!DOCTYPE html>
<html lang="en">
<head>

    <style>
      body {
        font-family: Arial;
        margin: 0;
        padding: 20px;
      }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    .card {
      flex: 1 1 calc(50% - 20px); /* 2 per row */
      background: #f4f4f4;
      padding: 20px;
      text-align: center;
      border-radius: 10px;
    }

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    h1 {
      width: 100%;
      margin: 0;
    }
  </style>
</head>

<body>
<header>
  <a href="index.html"><img src="Images/angelface logo.png" alt="AngelFace" width="200"></a>
  <nav>
    <a href="index.html">HOME</a>
    <a href="contact.html">CONTACT</a>
    <a href="portfolio.html">PORTFOLIO</a>
    <div class="dropdown">
      <button class="dropbtn" type="button">MORE+</button>
      <div class="dropdown-content">
        <a href="angelface.html">Angelface</a>
        <a href="graphics.html">Graphics</a>
        <a href="Illustrations.html">Illustration</a>
        <a href="other.html">Other</a>
      </div>
    </div>
  </nav>
</header>

<h1>GRAPHICS</h1>

<div class="container">
  <div class="card">Project 1</div>
  <div class="card">Project 2</div>
  <div class="card">Project 3</div>
  <div class="card">Project 4</div>
</div>

<script>
  document.addEventListener('click', function(event) {
    var button = document.querySelector('.dropbtn');
    var dropdown = document.querySelector('.dropdown-content');
    if (!button || !dropdown) return;

    if (button.contains(event.target)) {
      dropdown.classList.toggle('show');
    } else if (!dropdown.contains(event.target)) {
      dropdown.classList.remove('show');
    }
  });
</script>

</body>
